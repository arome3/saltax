version: "1.0"
agent:
  name: "SaltaX"
  description: "Sovereign Code Organism"
  repo: "arome3/saltax"

database:
  pool_min_size: 2
  pool_max_size: 10
  pool_timeout: 30.0
  statement_timeout_ms: 30000

pipeline:
  approval_threshold: 0.75
  self_modification_threshold: 0.90
  review_threshold: 0.50
  stages:
    static_scanner:
      enabled: true
      timeout_seconds: 120
      rulesets: ["p/security-audit", "p/owasp-top-ten"]
    ai_analyzer:
      enabled: true
      model: "gpt-oss-120b-f16"
      timeout_seconds: 120
      semaphore_timeout_seconds: 30
    test_executor:
      enabled: true
      timeout_seconds: 120
      memory_limit_mb: 512
    decision_engine:
      weights:
        static_clear: 0.25
        ai_quality: 0.25
        ai_security: 0.25
        tests_pass: 0.25

treasury:
  reserve_ratio: 0.20
  compute_budget: 0.10
  bounty_budget: 0.65
  community_fund: 0.05
  max_single_payout_eth: 0.5
  contract_address: "0x3F30232309A9580325F5060B7f5fd22645F50442"

bounties:
  labels:
    "bounty-xs": 0.01
    "bounty-sm": 0.05
    "bounty-md": 0.10
    "bounty-lg": 0.25
    "bounty-xl": 0.50

optimistic_verification:
  standard_window_hours: 0.033
  self_modification_window_hours: 0.1
  check_interval_seconds: 10
  min_challenge_stake_multiplier: 1.0
  require_ci_pass: true

staking:
  enabled: true
  contract_address: "0x3B255d624E467F371C0E56fC86ea09fd8A28001e"
  bonus_rate_no_challenge: 0.10
  bonus_rate_challenged_upheld: 0.20
  slash_rate_challenged_overturned: 0.50

audit_pricing:
  security_only_usdc: 5
  quality_only_usdc: 3
  full_audit_usdc: 10

triage:
  enabled: true
  mode: "autonomous"
  dedup:
    enabled: true
    similarity_threshold: 0.85
    embedding_model: "bge-small-en-v1.5"
  ranking:
    enabled: true
    label_superseded: "superseded"
    label_recommended: "saltax-recommended"
  vision:
    enabled: false
    alignment_weight: 0.15
    source: "repo"
  advisory:
    review_type: "COMMENT"
    label_recommends_merge: "saltax-recommends-merge"
    label_recommends_reject: "saltax-recommends-reject"

patrol:
  enabled: true
  repos: ["arome3/sentinel-triage"]
  interval_seconds: 120
  max_concurrent_repos: 3
  dependency_audit:
    enabled: true
    severity_threshold: "HIGH"
    auto_patch: true
    bounty_for_breaking: true
  codebase_scan:
    enabled: true
    semgrep_config: "auto"
    rescan_interval_hours: 168
  bounty_assignment:
    enabled: true
    severity_to_label:
      CRITICAL: "bounty-xl"
      HIGH: "bounty-lg"
      MEDIUM: "bounty-md"
      LOW: "bounty-sm"
    max_open_bounties_per_repo: 10
