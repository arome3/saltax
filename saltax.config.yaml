version: "1.0"
agent:
  name: "SaltaX"
  description: "Sovereign Code Organism"

pipeline:
  approval_threshold: 0.75
  self_modification_threshold: 0.90
  review_threshold: 0.50
  stages:
    static_scanner:
      enabled: true
      timeout_seconds: 120
      rulesets: ["p/security-audit", "p/owasp-top-ten"]
    ai_analyzer:
      enabled: true
      model: "gpt-oss-120b-f16"
      timeout_seconds: 60
      semaphore_timeout_seconds: 30
    test_executor:
      enabled: true
      timeout_seconds: 300
      memory_limit_mb: 512
    decision_engine:
      weights:
        static_clear: 0.25
        ai_quality: 0.25
        ai_security: 0.25
        tests_pass: 0.25

treasury:
  reserve_ratio: 0.20
  compute_budget: 0.10
  bounty_budget: 0.65
  community_fund: 0.05
  max_single_payout_eth: 0.5

bounties:
  labels:
    "bounty-xs": 0.01
    "bounty-sm": 0.05
    "bounty-md": 0.10
    "bounty-lg": 0.25
    "bounty-xl": 0.50

optimistic_verification:
  standard_window_hours: 24
  self_modification_window_hours: 72
  min_challenge_stake_multiplier: 1.0

staking:
  enabled: true
  bonus_rate_no_challenge: 0.10
  bonus_rate_challenged_upheld: 0.20
  slash_rate_challenged_overturned: 0.50

audit_pricing:
  security_only_usdc: 5
  quality_only_usdc: 3
  full_audit_usdc: 10

triage:
  enabled: false
  mode: "autonomous"
  dedup:
    enabled: true
    similarity_threshold: 0.85
    embedding_model: "text-embedding"
  ranking:
    enabled: true
    label_superseded: "superseded"
    label_recommended: "saltax-recommended"
  vision:
    enabled: false
    alignment_weight: 0.15
    source: "repo"
  advisory:
    review_type: "COMMENT"
    label_recommends_merge: "saltax-recommends-merge"
    label_recommends_reject: "saltax-recommends-reject"
